<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>25 + 5 Clock</title>
  <link rel="stylesheet" href="style.css"/>
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function App() {
      const [timeLeft, setTimeLeft] = useState(1500);
      const [isRunning, setIsRunning] = useState(false);

      useEffect(() => {
        if (!isRunning) return;

        const interval = setInterval(() => {
          setTimeLeft(prev => (prev > 0 ? prev - 1 : 0));
        }, 1000);

        return () => clearInterval(interval);
      }, [isRunning]);

      const format = (t) => {
        const m = Math.floor(t / 60);
        const s = t % 60;
        return `${m.toString().padStart(2,"0")}:${s.toString().padStart(2,"0")}`;
      };

      return (
  <div className="App">

    <h1>25 + 5 Clock</h1>

    <div className="length-container">

      {/* BREAK */}
      <div>
        <h2 id="break-label">Break Length</h2>

        <button id="break-decrement" onClick={() => setBreakLength(p => Math.max(1, p - 1))}>
          <i className="fas fa-arrow-down"></i>
        </button>

        <span id="break-length">{breakLength}</span>

        <button id="break-increment" onClick={() => setBreakLength(p => Math.min(60, p + 1))}>
          <i className="fas fa-arrow-up"></i>
        </button>
      </div>

      {/* SESSION */}
      <div>
        <h2 id="session-label">Session Length</h2>

        <button id="session-decrement" onClick={() => setSessionLength(p => Math.max(1, p - 1))}>
          <i className="fas fa-arrow-down"></i>
        </button>

        <span id="session-length">{sessionLength}</span>

        <button id="session-increment" onClick={() => setSessionLength(p => Math.min(60, p + 1))}>
          <i className="fas fa-arrow-up"></i>
        </button>
      </div>

    </div>

    {/* TIMER */}
    <div className="timer-box">
      <h2 id="timer-label">{mode}</h2>
      <div id="time-left">{format(timeLeft)}</div>
    </div>

    {/* CONTROLS */}
    <div className="controls">

      <button id="start_stop" onClick={() => setIsRunning(!isRunning)}>
        <i className={isRunning ? "fas fa-pause" : "fas fa-play"}></i>
      </button>

      <button id="reset" onClick={reset}>
        <i className="fas fa-sync-alt"></i>
      </button>

    </div>

    {/* AUDIO */}
    <audio
      id="beep"
      ref={audioRef}
      src="https://cdn.freecodecamp.org/testable-projects-fcc/audio/BeepSound.wav"
    />

  </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
